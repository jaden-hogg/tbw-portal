{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-6 col-md-4">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--hogg-navy); letter-spacing:.05em;">TBW Portal</div>
          <div class="text-muted small">Powered by Hogg Outfitters</div>
        </div>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-600">Password</label>
            <input type="password" name="password" class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-dark w-100">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
